<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Password Generator</title>

<style>
/* ===== BACKGROUND GRADIENT ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== GLASS EFFECT CONTAINER ===== */
.container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 25px;
    width: 350px;
    color: white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

/* ===== TITLE ===== */
h2 {
    text-align: center;
    margin-bottom: 15px;
}

/* ===== INPUT FIELD ===== */
input[type="number"],
#password {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* ===== CHECKBOX OPTIONS ===== */
.options label {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

/* ===== BUTTON STYLE ===== */
button {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #ff7eb3, #ff758c);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #43e97b, #38f9d7);
}

/* ===== STRENGTH COLORS ===== */
.strength {
    margin-top: 10px;
    font-weight: bold;
}

.weak { color: #ff4d4d; }
.medium { color: #ffd633; }
.strong { color: #00ff99; }

</style>
</head>

<body>

<div class="container">
    <h2>🔐 Password Generator</h2>

    <!-- LENGTH -->
    <label>Password Length</label>
    <input type="number" id="length" value="10" min="4" max="25">

    <!-- OPTIONS -->
    <div class="options">
        <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
        <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
        <label><input type="checkbox" id="numbers" checked> Numbers</label>
        <label><input type="checkbox" id="symbols"> Symbols</label>
    </div>

    <!-- BUTTONS -->
    <button onclick="generatePassword()">✨ Generate Password</button>

    <!-- OUTPUT -->
    <input type="text" id="password" readonly>

    <!-- STRENGTH -->
    <div id="strength" class="strength"></div>

    <button onclick="generateMultiple()">⚡ Generate 5 Passwords</button>
    <button onclick="copyPassword()">📋 Copy Password</button>
    <button onclick="savePassword()">💾 Save to File</button>
</div>

<script>
// CHARACTER SETS
const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lower = "abcdefghijklmnopqrstuvwxyz";
const numbers = "0123456789";
const symbols = "!@#$%^&*()_+";

// GENERATE PASSWORD
function generatePassword() {
    let length = document.getElementById("length").value;

    let useUpper = document.getElementById("uppercase").checked;
    let useLower = document.getElementById("lowercase").checked;
    let useNumbers = document.getElementById("numbers").checked;
    let useSymbols = document.getElementById("symbols").checked;

    let allChars = "";

    if (useUpper) allChars += upper;
    if (useLower) allChars += lower;
    if (useNumbers) allChars += numbers;
    if (useSymbols) allChars += symbols;

    if (allChars === "") {
        alert("Select at least one option!");
        return;
    }

    let password = "";

    for (let i = 0; i < length; i++) {
        let randomIndex = Math.floor(Math.random() * allChars.length);
        password += allChars[randomIndex];
    }

    document.getElementById("password").value = password;
    checkStrength(password);
}

// STRENGTH CHECKER
function checkStrength(password) {
    let strengthText = document.getElementById("strength");
    let strength = 0;

    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    if (strength <= 2) {
        strengthText.innerHTML = "🔴 Weak Password";
        strengthText.className = "strength weak";
    } else if (strength == 3) {
        strengthText.innerHTML = "🟡 Medium Password";
        strengthText.className = "strength medium";
    } else {
        strengthText.innerHTML = "🟢 Strong Password";
        strengthText.className = "strength strong";
    }
}

// MULTIPLE PASSWORDS
function generateMultiple() {
    let list = "";
    for (let i = 0; i < 5; i++) {
        generatePassword();
        list += document.getElementById("password").value + "\n";
    }
    alert("Generated Passwords:\n\n" + list);
}

// COPY PASSWORD
function copyPassword() {
    let passwordField = document.getElementById("password");
    passwordField.select();
    document.execCommand("copy");
    alert("Password Copied!");
}

// SAVE FILE
function savePassword() {
    let password = document.getElementById("password").value;

    if (password === "") {
        alert("Generate password first!");
        return;
    }

    let blob = new Blob([password], { type: "text/plain" });
    let link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "password.txt";
    link.click();
}
</script>

</body>
</html>
